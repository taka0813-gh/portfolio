<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Sawarabi+Gothic&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/reset.css">
  <script src="./js/main.js" defer></script>
</head>
<body>
  <button class="back-btn"><a href="index.html" class="back">< Back</a></button>
    <section class="section">
      <h1 class="title">-Work-</h1>
      <div class="work_content_wrap">
        <!-- ２つコンテンツを表示 -->
        <div class="new-content-first"></div>
        <div class="new-content-second"></div>
      </div>
      <button class="work_more_btn"><a href="more.html?filter=web&from=web-design" class="work_more_link">more</a></button>
      <p class="work_text">
        IT業界に転職後、主にバックエンドの開発業務を
        行ってきました！簡易な改修業務はお任せください。
        また、別業種の間ホームページ作成を行っておりました。
        デザイン作成からWordPress移行まで、どのフェーズでも
        対応可能ですのでお気軽にお声掛けください。
      </p>
    </section>
    <section class="section">
      <h2 class="title">-Skill-</h2>
      <div class="skill-section">
        <div class="skill-grid">
          <div class="skill-item">
            <img src="./img/html.png" class="skill-icon" alt="HTML">
            <span class="skill-name">HTML</span>
            <span class="skill-stars">★★★★★</span>
          </div>
          <div class="skill-item">
            <img src="./img/css.png" class="skill-icon" alt="CSS">
            <span class="skill-name">CSS</span>
            <span class="skill-stars">★★★★★</span>
          </div>
          <div class="skill-item">
            <img src="./img/js.png" class="skill-icon" alt="JavaScript">
            <span class="skill-name">JavaScript</span>
            <span class="skill-stars">★★★★</span>
          </div>
          <div class="skill-item">
            <img src="./img/wordpress.png" class="skill-icon" alt="WordPress">
            <span class="skill-name">WordPress</span>
            <span class="skill-stars">★★★★</span>
          </div>
          <div class="skill-item">
            <img src="./img/java.png" class="skill-icon" alt="Java">
            <span class="skill-name">Java</span>
            <span class="skill-stars">★★★</span>
          </div>
          <div class="skill-item">
            <img src="./img/vb.png" class="skill-icon" alt="VB.NET">
            <span class="skill-name">VB.NET</span>
            <span class="skill-stars">★★★★</span>
          </div>
          <div class="skill-item">
            <img src="./img/c.png" class="skill-icon" alt="C#">
            <span class="skill-name">C#</span>
            <span class="skill-stars">★★★</span>
          </div>
          <div class="skill-item">
            <img src="./img/flutter.png" class="skill-icon" alt="Dart / Flutter">
            <span class="skill-name">Dart / Flutter</span>
            <span class="skill-stars">★★★</span>
          </div>
          <div class="skill-item">
            <img src="./img/figma.png" class="skill-icon" alt="Figma">
            <span class="skill-name">Figma</span>
            <span class="skill-stars">★★★</span>
          </div>
        </div>
        <div class="skill-bottom">
          <div class="skill-item">
            <img src="./img/canva.png" class="skill-icon" alt="Canva">
            <span class="skill-name">Canva</span>
            <span class="skill-stars">★★★★</span>
          </div>
        </div>
      </div>
    </section>
    <footer class="footer">
        <p>© 2026 Taka Portfolio</p>
    </footer>
</body>
</html>
